name: Preprocess Dataset

on:
  push:
    paths:
      - 'Obesity_raw/**'
      - 'preprocessing/**'
  workflow_dispatch: {}
  
permissions:
  contents: write
  actions: write

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn joblib

      - name: Run obesity preprocessing
        run: |
          python "preprocessing/automate_Brian Aji Pamungkas.py" \
            --input "Obesity_raw/Obesity.csv" \
            --output "preprocessing"

      - name: Commit and push processed data
        run: |
          git config --global user.name ${{ secrets.USERNAME }}
          git config --global user.email ${{ secrets.EMAIL }}
          git add "preprocessing/Obesity_preprocessing.csv"
          git commit -m 'Add processed dataset'
          git push
